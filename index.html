<script>

function ageLabel(ts) {
  if (!ts) return null;
  const ms = Date.now() - new Date(ts).getTime();
  const m = Math.floor(ms / 60000);
  const h = Math.floor(m / 60);
  const d = Math.floor(h / 24);
  if (m < 2)  return 'Just now';
  if (m < 60) return `${m}m ago`;
  if (h < 24) return `${h}h ${m % 60}m ago`;
  return `${d}d ${h % 24}h ago`;
}

function ageStatus(ts) {
  if (!ts) return 'error';
  const h = (Date.now() - new Date(ts).getTime()) / 3600000;
  if (h < 1.5)  return 'live';
  if (h < 14)   return 'stale';
  return 'error';
}

function badge(status, label) {
  return `<span class="badge badge-${status}">
    <span class="dot dot-${status}"></span>${label || status}
  </span>`;
}

function fmt$(n) {
  if (n == null) return '芒聙聰';
  return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

async function safeFetch(url) {
  try {
    const r = await fetch(url + (url.includes('?') ? '&' : '?') + '_t=' + Date.now());
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

// 芒聰聙芒聰聙芒聰聙 Kalshi 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙

async function loadKalshi() {
  const [d, hb] = await Promise.all([
    safeFetch('https://mikedmote52.github.io/kalshi-vercel-deploy/dashboard_data.json'),
    safeFetch('https://mikedmote52.github.io/kalshi-vercel-deploy/heartbeat.json'),
  ]);
  const ts = d?.generated_at || hb?.exported_at || hb?.started_at;
  const st = ts ? ageStatus(ts) : 'error';
  const age = ts ? ageLabel(ts) : 'No data';
  const opps = (d?.opportunities || []).length;
  const pos  = Array.isArray(d?.positions) ? d.positions.length : (d?.positions ?? '芒聙聰');

  let alert = '';
  if (hb?.started_at && !hb?.exported_at) {
    alert = `<div class="alert alert-err">芒職聽 Pipeline ran but export failed 芒聙聰 data stale</div>`;
  } else if (st === 'error') {
    alert = `<div class="alert alert-warn">芒職聽 Data ${age} 芒聙聰 check refresh cron</div>`;
  } else if (st === 'stale') {
    alert = `<div class="alert alert-warn">芒職聽 Data ${age}</div>`;
  }

  return `
  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-title">芒職隆 Kalshi</div>
        <div class="card-sub">Prediction market edge-seeking</div>
      </div>
      ${badge(st)}
    </div>
    ${alert}
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Balance</div>
        <div class="metric-value val-blue">${fmt$(d?.balance)}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Open Positions</div>
        <div class="metric-value">${pos}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Opportunities</div>
        <div class="metric-value ${opps > 0 ? 'val-green' : ''}">${opps}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Markets Scanned</div>
        <div class="metric-value">${d?.markets_scanned ?? d?.latest_scan?.markets_pulled ?? '芒聙聰'}</div>
      </div>
    </div>
    <div class="card-footer">
      <span>Data: ${age}</span>
      <a class="open-link" href="https://mikedmote52.github.io/kalshi-vercel-deploy/" target="_blank">Open Dashboard 芒聠聮</a>
    </div>
  </div>`;
}

// 芒聰聙芒聰聙芒聰聙 Trading Bot 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙

async function loadTradingBot() {
  const d = await safeFetch('https://mikedmote52.github.io/mikes-trading-bot-dashboard/health.json');
  const ts = d?.timestamp || d?.last_updated || d?.generated_at || d?.as_of;
  const st = ts ? ageStatus(ts) : (d ? 'stale' : 'error');
  const age = ts ? ageLabel(ts) : (d ? 'Unknown' : 'No data');

  const equity   = d?.equity ?? d?.total_equity ?? d?.portfolio_value;
  const pnl      = d?.today_pnl ?? d?.daily_pnl ?? d?.pnl_today;
  const posCount = d?.open_positions ?? d?.positions ?? d?.position_count;
  const wr       = d?.win_rate;
  const wrLabel  = wr != null ? Math.round(wr * (wr <= 1 ? 100 : 1)) + '%' : '芒聙聰';
  const wrClass  = wr != null ? (wr * (wr <= 1 ? 100 : 1) > 50 ? 'val-green' : 'val-yellow') : '';

  const pnlClass = pnl == null ? '' : pnl >= 0 ? 'val-green' : 'val-red';
  const pnlStr   = pnl == null ? '芒聙聰' : (pnl >= 0 ? '+' : '') + fmt$(pnl);

  let alert = '';
  if (st === 'error') alert = `<div class="alert alert-err">芒職聽 Health file ${age} 芒聙聰 daemon may be down</div>`;
  else if (st === 'stale') alert = `<div class="alert alert-warn">芒職聽 Data ${age} 芒聙聰 daemon offline?</div>`;

  return `

    <div class="card-header">
      <div>

    <div class="metrics">

        <div class="metric-value val-blue">${fmt$(equity)}</div>
      </div>
      <div class="metric">

        <div class="metric-value ${pnlClass}">${pnlStr}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Positions</div>
        <div class="metric-value">${posCount ?? '芒聙聰'}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Win Rate</div>
        <div class="metric-value ${wrClass}">${wrLabel}</div>
      </div>
    </div>
    <div class="card-footer">
      <span>Data: ${age}</span>
      <a class="open-link" href="https://mikedmote52.github.io/mikes-trading-bot-dashboard/" target="_blank">Open Dashboard 芒聠聮</a>
    </div>
  </div>`;

  return `
