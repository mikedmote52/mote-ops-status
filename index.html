<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mote Ops &#8212; Status</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #e1e4e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 20px;
    }
    .header {
      text-align: center;
      padding: 24px 0 16px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #e1e4e8;
      letter-spacing: -0.3px;
    }
    .header .sub {
      font-size: 12px;
      color: #8b949e;
      margin-top: 4px;
    }
    .refresh-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      font-size: 11px;
      color: #484f58;
    }
    .refresh-btn {
      background: #161b22;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      transition: all 0.15s;
    }
    .refresh-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 16px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #58a6ff44; }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .card-title { font-size: 14px; font-weight: 600; color: #e1e4e8; }
    .card-sub { font-size: 10px; color: #484f58; margin-top: 2px; }
    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .badge-live   { background: rgba(63,185,80,.15);  color: #3fb950; }
    .badge-stale  { background: rgba(210,153,34,.15); color: #d29922; }
    .badge-error  { background: rgba(248,81,73,.15);  color: #f85149; }
    .badge-loading{ background: rgba(88,166,255,.1);  color: #58a6ff; }
    .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .dot-live  { background: #3fb950; animation: pulse 2s infinite; }
    .dot-stale { background: #d29922; }
    .dot-error { background: #f85149; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .metrics {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .metric {
      background: #0d1117;
      border-radius: 6px;
      padding: 8px 10px;
    }
    .metric-label {
      font-size: 9px;
      color: #484f58;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }
    .metric-value { font-size: 17px; font-weight: 700; color: #e1e4e8; }
    .val-green  { color: #3fb950; }
    .val-yellow { color: #d29922; }
    .val-red    { color: #f85149; }
    .val-blue   { color: #58a6ff; }
    .val-purple { color: #a371f7; }
    .alert {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .alert-warn {
      background: rgba(210,153,34,.1);
      border: 1px solid rgba(210,153,34,.25);
      color: #d29922;
    }
    .alert-err {
      background: rgba(248,81,73,.1);
      border: 1px solid rgba(248,81,73,.25);
      color: #f85149;
    }
    .alert-info {
      background: rgba(88,166,255,.08);
      border: 1px solid rgba(88,166,255,.2);
      color: #58a6ff;
    }
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      color: #484f58;
      padding-top: 8px;
      border-top: 1px solid #21262d;
    }
    .open-link {
      color: #58a6ff;
      text-decoration: none;
      font-size: 11px;
      font-weight: 500;
    }
    .open-link:hover { text-decoration: underline; }
    .spinner {
      display: inline-block;
      width: 9px; height: 9px;
      border: 2px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .skeleton {
      background: linear-gradient(90deg, #161b22 25%, #1c2128 50%, #161b22 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 6px;
      height: 60px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
  </style>
</head>
<body>

<div class="header">
  <h1>&#9889; Mote Ops &#8212; Status</h1>
  <div class="sub">Four systems &#183; live pulse</div>
</div>

<div class="refresh-bar">
  <span id="refresh-ts">Loading&#8230;</span>
  <button class="refresh-btn" onclick="refreshAll()">&#8635; Refresh</button>
</div>

<div class="grid" id="grid">
  <div class="skeleton"></div>
  <div class="skeleton"></div>
  <div class="skeleton"></div>
  <div class="skeleton"></div>
</div>

<script>
// --- helpers -------------------------------------------------------------------

async function safeFetch(url) {
  try {
    const r = await fetch(url + (url.includes('?') ? '&' : '?') + '_cb=' + Date.now());
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

function ageHours(ts) {
  return (Date.now() - new Date(ts).getTime()) / 3600000;
}

function ageStatus(ts) {
  if (!ts) return 'error';
  const h = ageHours(ts);
  if (h < 2)  return 'live';
  if (h < 14) return 'stale';
  return 'error';
}

function ageLabel(ts) {
  if (!ts) return 'Unknown';
  const h = ageHours(ts);
  if (h < 1)  return Math.round(h * 60) + 'm ago';
  if (h < 24) return Math.round(h) + 'h ago';
  return Math.round(h / 24) + 'd ago';
}

function badge(st, label) {
  const dot = st === 'live' ? 'dot-live' : st === 'stale' ? 'dot-stale' : 'dot-error';
  const cls = st === 'live' ? 'badge-live' : st === 'stale' ? 'badge-stale' : 'badge-error';
  const text = label || (st === 'live' ? 'Live' : st === 'stale' ? 'Stale' : 'Error');
  return `<div class="badge ${cls}"><span class="dot ${dot}"></span>${text}</div>`;
}

function fmt$(n) {
  if (n == null || isNaN(n)) return '$--';
  return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// --- Kalshi -------------------------------------------------------------------

async function loadKalshi() {
  const [d, hb] = await Promise.all([
    safeFetch('https://mikedmote52.github.io/kalshi-vercel-deploy/dashboard_data.json'),
    safeFetch('https://mikedmote52.github.io/kalshi-vercel-deploy/heartbeat.json'),
  ]);

  const ts  = d?.generated_at || hb?.exported_at;
  const st  = ts ? ageStatus(ts) : (d ? 'stale' : 'error');
  const age = ts ? ageLabel(ts) : (d ? 'Unknown' : 'No data');

  const balance  = d?.balance;
  const pnl      = d?.total_pnl ?? 0;
  const posCount = d?.positions ?? (d?.position_details?.length ?? null);

  const unrealized = d?.position_details
    ? d.position_details.reduce((s, p) => s + (p.unrealized_pnl || 0), 0)
    : null;

  const pnlClass     = pnl >= 0 ? 'val-green' : 'val-red';
  const pnlStr       = (pnl >= 0 ? '+' : '') + fmt$(pnl);
  const unrClass     = unrealized == null ? '' : unrealized >= 0 ? 'val-green' : 'val-red';
  const unrStr       = unrealized == null ? '--' : (unrealized >= 0 ? '+' : '') + fmt$(unrealized);

  let alert = '';
  if (st === 'error') {
    alert = `<div class="alert alert-err">&#9888; Feed ${age} &#8212; data pipeline may be down</div>`;
  } else if (st === 'stale') {
    alert = `<div class="alert alert-warn">&#8634; Feed ${age} &#8212; check GitHub Action</div>`;
  }

  return `
  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-title">&#127922; Kalshi</div>
        <div class="card-sub">Prediction market bot &#183; AI scanner</div>
      </div>
      ${badge(st)}
    </div>
    ${alert}
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Balance</div>
        <div class="metric-value val-blue">${fmt$(balance)}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Realized P&amp;L</div>
        <div class="metric-value ${pnlClass}">${pnlStr}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Positions</div>
        <div class="metric-value">${posCount ?? '--'}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Unrealized</div>
        <div class="metric-value ${unrClass}">${unrStr}</div>
      </div>
    </div>
    <div class="card-footer">
      <span>Data: ${age}</span>
      <a class="open-link" href="https://mikedmote52.github.io/kalshi-vercel-deploy/" target="_blank">Open Dashboard &#8594;</a>
    </div>
  </div>`;
}

// --- Trading Bot --------------------------------------------------------------

async function loadTradingBot() {
  const d = await safeFetch('https://mikedmote52.github.io/mikes-trading-bot-dashboard/data/health.json');
  const ts = d?.timestamp || d?.last_updated || d?.generated_at;
  const s  = d?.stats || {};

  // Bot runs during market hours only -- 26h threshold (not 14h)
  function botAgeStatus(ts) {
    if (!ts) return 'error';
    const h = ageHours(ts);
    if (h < 2)  return 'live';
    if (h < 26) return 'stale';
    return 'error';
  }

  const st  = ts ? botAgeStatus(ts) : (d ? 'stale' : 'error');
  const age = ts ? ageLabel(ts) : (d ? 'Unknown' : 'No data');

  const equity   = s.equity ?? s.total_equity;
  const pnl      = s.total_pnl;
  const posCount = s.num_positions ?? s.open_positions;
  const wr       = s.win_rate;

  const wrLabel  = wr != null ? Math.round(wr) + '%' : '--';
  const wrClass  = wr != null ? (wr > 50 ? 'val-green' : 'val-yellow') : '';
  const pnlClass = pnl == null ? '' : pnl >= 0 ? 'val-green' : 'val-red';
  const pnlStr   = pnl == null ? '--' : (pnl >= 0 ? '+' : '') + fmt$(pnl);

  const winners = (s.big_winners || s.trailing || []).slice(0, 2);

  let alert = '';
  if (st === 'error') {
    alert = `<div class="alert alert-err">&#9888; Health file ${age} &#8212; daemon may be down</div>`;
  } else if (winners.length > 0) {
    alert = `<div class="alert alert-info">&#8593; Top: ${winners.join(' &middot; ')}</div>`;
  }

  return `
  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-title">&#129302; Trading Bot</div>
        <div class="card-sub">Biotech momentum &#183; Alpaca paper</div>
      </div>
      ${badge(st)}
    </div>
    ${alert}
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Equity</div>
        <div class="metric-value val-blue">${fmt$(equity)}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Total P&amp;L</div>
        <div class="metric-value ${pnlClass}">${pnlStr}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Positions</div>
        <div class="metric-value">${posCount ?? '--'}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Win Rate</div>
        <div class="metric-value ${wrClass}">${wrLabel}</div>
      </div>
    </div>
    <div class="card-footer">
      <span>Data: ${age}</span>
      <a class="open-link" href="https://mikedmote52.github.io/mikes-trading-bot-dashboard/" target="_blank">Open Dashboard &#8594;</a>
    </div>
  </div>`;
}

// --- Stuart House -------------------------------------------------------------

async function loadStuartHouse() {
  const d = await safeFetch('https://mikedmote52.github.io/stuart-house-dashboard/data.json');
  const ts = d?.lastUpdated;
  const st = ts ? ageStatus(ts) : (d ? 'stale' : 'error');
  const age = ts ? ageLabel(ts) : (d ? 'Unknown' : 'No data');

  const s       = d?.stats || {};
  const live    = s.live    ?? '--';
  const pending = s.pending ?? '--';
  const prosp   = s.prospects ?? '--';
  const actions = s.actions ?? '--';

  const actClass  = typeof actions === 'number' && actions > 0 ? 'val-yellow' : '';
  const prospClass = typeof prosp === 'number' && prosp > 0 ? 'val-blue' : '';

  const leaseSigned = (d?.prospects || []).find(p => p.status && p.status.includes('LEASE SIGNED'));
  const topAction   = (d?.actions || [])[0];

  let alert = '';
  if (leaseSigned) {
    alert = `<div class="alert alert-info">&#10003; Room A leased &#8212; ${leaseSigned.name} &middot; Aug 1 &middot; Room B still open</div>`;
  } else if (typeof actions === 'number' && actions > 0) {
    alert = `<div class="alert alert-warn">&#9888; ${actions} action${actions > 1 ? 's' : ''} need attention</div>`;
  } else if (st === 'error') {
    alert = `<div class="alert alert-err">&#9888; Data ${age} &#8212; sweeps may not be running</div>`;
  }

  return `
  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-title">&#127968; Stuart House</div>
        <div class="card-sub">${d?.property?.address ?? '2322 Stuart St'} &#183; Berkeley rental</div>
      </div>
      ${badge(st)}
    </div>
    ${alert}
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Live Listings</div>
        <div class="metric-value ${typeof live === 'number' && live > 0 ? 'val-green' : ''}">${live}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Prospects</div>
        <div class="metric-value ${prospClass}">${prosp}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Actions Needed</div>
        <div class="metric-value ${actClass}">${actions}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Pending</div>
        <div class="metric-value">${pending}</div>
      </div>
    </div>
    ${topAction && !leaseSigned ? `<div class="alert alert-info" style="margin-top:0;margin-bottom:10px">#1: ${topAction.priority ?? topAction.text ?? ''}</div>` : ''}
    <div class="card-footer">
      <span>Data: ${age}</span>
      <a class="open-link" href="https://mikedmote52.github.io/stuart-house-dashboard/" target="_blank">Open Dashboard &#8594;</a>
    </div>
  </div>`;
}

// --- SideGigBot ---------------------------------------------------------------

async function loadSideGigBot() {
  let reachable = false;
  try {
    await fetch('https://mikedmote52.github.io/moteops-landing/sidegigbot.html', { mode: 'no-cors' });
    reachable = true;
  } catch(e) {}

  const st = reachable ? 'stale' : 'error';

  return `
  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-title">&#128640; SideGigBot</div>
        <div class="card-sub">Opportunity pipeline &#183; Mote Ops lead-gen</div>
      </div>
      ${badge(st, reachable ? 'Up' : 'Down')}
    </div>
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Total Scanned</div>
        <div class="metric-value">15</div>
      </div>
      <div class="metric">
        <div class="metric-label">Active Plays</div>
        <div class="metric-value val-green">2</div>
      </div>
      <div class="metric">
        <div class="metric-label">In Testing</div>
        <div class="metric-value val-blue">3</div>
      </div>
      <div class="metric">
        <div class="metric-label">Tests Executed</div>
        <div class="metric-value val-red">0%</div>
      </div>
    </div>
    <div class="alert alert-err">&#9888; Critical: 0% tests executed &#8212; execution gap, not pipeline gap</div>
    <div class="card-footer">
      <span>Last audit: Apr 8 &#183; static snapshot</span>
      <a class="open-link" href="https://mikedmote52.github.io/moteops-landing/sidegigbot.html" target="_blank">Open Dashboard &#8594;</a>
    </div>
  </div>`;
}

// --- orchestrator -------------------------------------------------------------

async function refreshAll() {
  document.getElementById('refresh-ts').innerHTML =
    '<span class="spinner"></span>&nbsp;Refreshing&hellis;';

  const [kalshi, bot, stuart, sgb] = await Promise.all([
    loadKalshi(),
    loadTradingBot(),
    loadStuartHouse(),
    loadSideGigBot(),
  ]);

  document.getElementById('grid').innerHTML = kalshi + bot + stuart + sgb;
  document.getElementById('refresh-ts').textContent =
    'Refreshed ' + new Date().toLocaleTimeString();
}

refreshAll();
setInterval(refreshAll, 5 * 60 * 1000);
</script>
</body>
</html>
